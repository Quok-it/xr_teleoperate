name: Pack and publish tv environment

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      cuda_version:
        description: "CUDA version for torch (cu118, cu121, cpu)"
        required: false
        default: "cu121"

env:
  CUDA_VERSION: ${{ github.event.inputs.cuda_version || 'cu121' }}
  TORCH_VERSION: "2.3.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: tv
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg-dev libusb-1.0-0-dev

      - name: Install torch
        shell: bash -el {0}
        run: |
          if [ "$CUDA_VERSION" = "cpu" ]; then
            pip install torch==$TORCH_VERSION --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch==$TORCH_VERSION --index-url https://download.pytorch.org/whl/$CUDA_VERSION
          fi

      - name: Install submodule packages
        shell: bash -el {0}
        run: |
          pip install ./teleop/robot_control/dex-retargeting
          pip install ./teleop/teleimager
          # Install vuer WITHOUT [all] extras — aiohttp is conda-managed.
          # televuer declares vuer[all] which would make pip reinstall
          # aiohttp from PyPI and break the conda version.
          pip install params-proto==2.13.2
          pip install vuer==0.0.60
          pip install --no-deps ./teleop/televuer

      - name: Install remaining requirements
        shell: bash -el {0}
        run: pip install -r requirements.txt

      - name: Verify environment
        shell: bash -el {0}
        run: |
          python -c "import torch; print(f'torch {torch.__version__}')"
          python -c "import pinocchio; print(f'pinocchio {pinocchio.__version__}')"
          python -c "import cv2; print(f'opencv {cv2.__version__}')"
          python -c "import dex_retargeting; print('dex_retargeting OK')"
          python -c "import televuer; print('televuer OK')"
          python -c "import teleimager; print('teleimager OK')"

      - name: Pack conda environment
        shell: bash -el {0}
        run: conda-pack -n tv -o tv-env.tar.gz --ignore-editable-packages

      - name: Build distributable tarball
        run: |
          tar czf tellyop.tar.gz \
            --exclude='teleop/utils/data' \
            --exclude='__pycache__' \
            tv-env.tar.gz \
            scripts/install.sh \
            teleop/ \
            requirements.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tellyop-${{ github.sha }}
          path: tellyop.tar.gz
          retention-days: 30

      - name: Publish to S3
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp tellyop.tar.gz s3://n1-waldos/tellyop/tellyop-${{ github.sha }}.tar.gz
          aws s3 cp s3://n1-waldos/tellyop/tellyop-${{ github.sha }}.tar.gz s3://n1-waldos/tellyop/tellyop-latest.tar.gz

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tellyop.tar.gz
