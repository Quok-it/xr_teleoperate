name: Build conda-pack environment

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      cuda_version:
        description: "CUDA version for torch (cu118, cu121, cpu)"
        required: false
        default: "cu121"

env:
  CUDA_VERSION: ${{ github.event.inputs.cuda_version || 'cu121' }}
  TORCH_VERSION: "2.3.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: waldo
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg-dev libusb-1.0-0-dev

      - name: Install torch
        shell: bash -el {0}
        run: |
          if [ "$CUDA_VERSION" = "cpu" ]; then
            pip install torch==$TORCH_VERSION --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch==$TORCH_VERSION --index-url https://download.pytorch.org/whl/$CUDA_VERSION
          fi

      - name: Install submodule packages
        shell: bash -el {0}
        run: |
          # Non-editable installs so paths are in site-packages (relocatable)
          pip install ./teleop/televuer
          pip install ./teleop/teleimager
          pip install ./teleop/robot_control/dex-retargeting

      - name: Install remaining requirements
        shell: bash -el {0}
        run: pip install -r requirements.txt

      - name: Verify environment
        shell: bash -el {0}
        run: |
          python -c "import torch; print(f'torch {torch.__version__}')"
          python -c "import pinocchio; print(f'pinocchio {pinocchio.__version__}')"
          python -c "import cv2; print(f'opencv {cv2.__version__}')"
          python -c "import dex_retargeting; print('dex_retargeting OK')"
          python -c "import televuer; print('televuer OK')"
          python -c "import teleimager; print('teleimager OK')"

      - name: Pack conda environment
        shell: bash -el {0}
        run: conda-pack -n waldo -o waldo-env.tar.gz --ignore-editable-packages

      - name: Build distributable tarball
        run: |
          mkdir -p waldo-dist

          # Packed conda environment
          mv waldo-env.tar.gz waldo-dist/

          # Application source + assets (exclude recorded data and venv)
          tar czf waldo-dist/xr_teleoperate.tar.gz \
            --exclude='april_venv' \
            --exclude='teleop/utils/data' \
            --exclude='*.tar' \
            --exclude='__pycache__' \
            .

          # Install script
          cp scripts/install.sh waldo-dist/
          chmod +x waldo-dist/install.sh

          # Bundle everything
          tar czf waldo-${{ github.sha }}.tar.gz waldo-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waldo-${{ github.sha }}
          path: waldo-${{ github.sha }}.tar.gz
          retention-days: 30

      - name: Publish to S3
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp waldo-${{ github.sha }}.tar.gz s3://n1-waldos/tellyop/waldo-${{ github.sha }}.tar.gz

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: waldo-${{ github.sha }}.tar.gz
